name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint, test (npm workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Lint all workspaces
        run: npm run lint

      - name: Unit/component tests (vitest, across workspaces)
        run: npm test

  e2e:
    name: End-to-end (Playwright, apps/web)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build all workspaces
        # apps/web resolves its @topview/* workspace deps via their built
        # dist/ output, so those must exist before tests/e2e's Playwright
        # webServer boots `npm run dev -w @topview/web` (see
        # tests/e2e/playwright.config.ts).
        run: npm run build

      - name: Install tests/e2e dependencies
        # tests/e2e is intentionally NOT an npm workspace member (excluded
        # from the root ["apps/*","packages/*","plugins/*"] globs), so it
        # gets its own explicit install step rather than riding along with
        # the root `npm ci` above.
        working-directory: tests/e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps

      - name: Run Playwright e2e suite
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

  python-service:
    name: reconstruction-api (best-effort — unverified locally)
    runs-on: ubuntu-latest
    # services/reconstruction-api cannot be run or tested on the scaffolding
    # machine used to author this repo (no Python toolchain available there
    # — see docs/installation.md, which states this as a prerequisite gap,
    # not a scaffold defect). CI provisions Python independently via
    # actions/setup-python, but this job is kept best-effort
    # (continue-on-error) and deliberately narrow in scope — lint + import
    # check only, no pytest — until it has actually been exercised end to
    # end in CI at least once.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install service dependencies
        working-directory: services/reconstruction-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        working-directory: services/reconstruction-api
        run: ruff check .

      - name: Import check
        working-directory: services/reconstruction-api
        # Discovers whichever top-level importable package lives in this
        # service directory (e.g. `app` or `reconstruction_api`) instead of
        # hardcoding one name, so this best-effort check doesn't itself
        # become a source of drift against the service's actual layout.
        run: |
          python - <<'PY'
          import importlib, pathlib, sys

          service_dir = pathlib.Path(".").resolve()
          candidates = sorted(
              p.name for p in service_dir.iterdir()
              if p.is_dir() and (p / "__init__.py").exists()
          )

          if not candidates:
              print("No importable package (dir with __init__.py) found under services/reconstruction-api", file=sys.stderr)
              sys.exit(1)

          for name in candidates:
              module = importlib.import_module(name)
              print(f"OK: imported {name!r} from {module.__file__}")
          PY
