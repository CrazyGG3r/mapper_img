[package]
name = "geometry-wasm"
version = "0.1.0"
edition = "2021"
description = "Perf-critical geometry kernels (point-cloud downsampling, polygon simplification) for TopView SVG Mapper, compiled to WebAssembly via wasm-bindgen."
license = "MIT OR Apache-2.0"
publish = false

[lib]
# cdylib: produces the .wasm binary wasm-pack packages for the browser.
# rlib: keeps `cargo check` / `cargo test` working as an ordinary native
# Rust crate, with no wasm toolchain needed for that alone (used by CI's
# best-effort rust-wasm job, see .github/workflows/ci.yml).
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[profile.release]
opt-level = 3
lto = true
